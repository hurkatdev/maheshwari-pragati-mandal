<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background: warm beige like broken wheat -->
  <circle cx="60" cy="60" r="60" fill="#fff7ed"/>
  <!-- Base pile -->
  <ellipse cx="60" cy="76" rx="42" ry="12" fill="#d97706" opacity="0.2"/>
  <ellipse cx="60" cy="68" rx="36" ry="15" fill="#ca8a04" opacity="0.28"/>
  <!-- Scattered broken wheat pieces - irregular shapes representing cracked wheat -->
  <rect x="38" y="55" width="12" height="7" rx="2" fill="#d97706" transform="rotate(-12 44 58)"/>
  <rect x="55" y="50" width="14" height="8" rx="2" fill="#b45309" transform="rotate(8 62 54)"/>
  <rect x="70" y="58" width="11" height="6" rx="2" fill="#ca8a04" transform="rotate(-5 75 61)"/>
  <rect x="44" y="66" width="10" height="6" rx="2" fill="#c47c0a" transform="rotate(15 49 69)"/>
  <rect x="63" y="67" width="13" height="7" rx="2" fill="#b45309" transform="rotate(-10 69 70)"/>
  <rect x="50" y="42" width="9" height="5" rx="2" fill="#d97706" transform="rotate(20 54 44)"/>
  <rect x="72" y="45" width="10" height="6" rx="2" fill="#ca8a04" transform="rotate(-15 77 48)"/>
  <rect x="35" y="48" width="8" height="5" rx="2" fill="#b45309" transform="rotate(5 39 50)"/>
  <!-- Grain texture lines on pieces -->
  <line x1="40" y1="56" x2="48" y2="56" stroke="#92400e" stroke-width="0.8" opacity="0.4" transform="rotate(-12 44 58)"/>
  <line x1="57" y1="53" x2="67" y2="53" stroke="#92400e" stroke-width="0.8" opacity="0.4" transform="rotate(8 62 54)"/>
  <line x1="72" y1="60" x2="80" y2="60" stroke="#92400e" stroke-width="0.8" opacity="0.4" transform="rotate(-5 75 61)"/>
  <!-- Small fragments -->
  <circle cx="82" cy="68" r="3" fill="#d97706" opacity="0.7"/>
  <circle cx="36" cy="70" r="2.5" fill="#ca8a04" opacity="0.7"/>
  <circle cx="55" cy="77" r="2" fill="#b45309" opacity="0.6"/>
  <circle cx="72" cy="75" r="3" fill="#d97706" opacity="0.7"/>
</svg>
