<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background: pale syrup colour -->
  <circle cx="60" cy="60" r="60" fill="#fffbeb"/>
  <!-- Syrup pool -->
  <ellipse cx="60" cy="75" rx="46" ry="14" fill="#fde68a" opacity="0.5"/>
  <ellipse cx="60" cy="73" rx="42" ry="11" fill="#fcd34d" opacity="0.35"/>
  <!-- Back rasgulla (partially visible) -->
  <circle cx="60" cy="50" r="20" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="56" cy="45" r="5" fill="#ffffff" opacity="0.6"/>
  <!-- Front left rasgulla -->
  <circle cx="38" cy="62" r="19" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="33" cy="56" r="5" fill="#ffffff" opacity="0.7"/>
  <circle cx="42" cy="55" r="2.5" fill="#f9fafb" opacity="0.5"/>
  <!-- Front right rasgulla -->
  <circle cx="82" cy="62" r="19" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="77" cy="56" r="5" fill="#ffffff" opacity="0.7"/>
  <circle cx="86" cy="55" r="2.5" fill="#f9fafb" opacity="0.5"/>
  <!-- Syrup drips / gloss -->
  <ellipse cx="60" cy="48" rx="6" ry="3" fill="#fde68a" opacity="0.3"/>
  <!-- Sponge texture on front balls -->
  <circle cx="34" cy="64" r="2" fill="#f3f4f6" opacity="0.6"/>
  <circle cx="42" cy="68" r="1.5" fill="#f3f4f6" opacity="0.6"/>
  <circle cx="38" cy="72" r="2" fill="#f3f4f6" opacity="0.5"/>
  <circle cx="79" cy="64" r="2" fill="#f3f4f6" opacity="0.6"/>
  <circle cx="86" cy="68" r="1.5" fill="#f3f4f6" opacity="0.6"/>
  <circle cx="82" cy="72" r="2" fill="#f3f4f6" opacity="0.5"/>
</svg>
