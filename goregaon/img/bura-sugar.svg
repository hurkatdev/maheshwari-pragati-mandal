<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background: warm amber/honey tone of raw cane sugar -->
  <circle cx="60" cy="60" r="60" fill="#fffbeb"/>
  <!-- Base pile -->
  <ellipse cx="60" cy="78" rx="42" ry="12" fill="#d97706" opacity="0.2"/>
  <ellipse cx="60" cy="70" rx="36" ry="15" fill="#ca8a04" opacity="0.3"/>
  <!-- Sugar crystal mound -->
  <ellipse cx="60" cy="63" rx="30" ry="14" fill="#fbbf24" opacity="0.7"/>
  <ellipse cx="60" cy="56" rx="22" ry="10" fill="#f59e0b" opacity="0.8"/>
  <ellipse cx="60" cy="50" rx="14" ry="7" fill="#fbbf24" opacity="0.9"/>
  <!-- Highlight -->
  <ellipse cx="52" cy="47" rx="7" ry="3" fill="#fde68a" opacity="0.7"/>
  <!-- Crystal shapes — angular facets of bura sugar granules -->
  <polygon points="76,36 82,42 76,48 70,42" fill="#fcd34d" stroke="#d97706" stroke-width="0.8"/>
  <polygon points="42,40 47,35 52,40 47,45" fill="#fbbf24" stroke="#ca8a04" stroke-width="0.8"/>
  <polygon points="82,58 87,63 82,68 77,63" fill="#fde68a" stroke="#d97706" stroke-width="0.8"/>
  <polygon points="35,55 40,50 45,55 40,60" fill="#fcd34d" stroke="#b45309" stroke-width="0.8"/>
  <polygon points="64,36 68,31 72,36 68,41" fill="#fbbf24" stroke="#ca8a04" stroke-width="0.8"/>
  <!-- Smaller crystals -->
  <polygon points="50,32 53,28 56,32 53,36" fill="#fde68a" stroke="#d97706" stroke-width="0.6"/>
  <polygon points="88,46 91,42 94,46 91,50" fill="#fcd34d" stroke="#ca8a04" stroke-width="0.6" opacity="0.7"/>
  <!-- Crystal shimmer -->
  <circle cx="78" cy="40" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="44" cy="38" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="84" cy="62" r="1" fill="#ffffff" opacity="0.5"/>
</svg>
