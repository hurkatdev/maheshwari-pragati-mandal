<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background: pure soft white -->
  <circle cx="60" cy="60" r="60" fill="#fafafa"/>
  <!-- Soft shadow base -->
  <ellipse cx="60" cy="78" rx="42" ry="11" fill="#e5e7eb" opacity="0.4"/>
  <ellipse cx="60" cy="70" rx="36" ry="14" fill="#f3f4f6" opacity="0.7"/>
  <!-- Fine powder mound: very white, smooth -->
  <ellipse cx="60" cy="63" rx="30" ry="14" fill="#f9fafb"/>
  <ellipse cx="60" cy="56" rx="22" ry="10" fill="#ffffff"/>
  <ellipse cx="60" cy="51" rx="14" ry="7" fill="#ffffff"/>
  <!-- Soft highlight — powdered sugar sheen -->
  <ellipse cx="53" cy="48" rx="7" ry="3" fill="#ffffff" opacity="0.9"/>
  <!-- Sparkle dots — fine powder catching light -->
  <circle cx="72" cy="44" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="74" cy="44" r="1" fill="#e5e7eb"/>
  <circle cx="46" cy="48" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="48" cy="48" r="1" fill="#e5e7eb"/>
  <circle cx="80" cy="54" r="1.5" fill="#ffffff"/>
  <circle cx="81" cy="54" r="0.8" fill="#d1d5db"/>
  <circle cx="38" cy="58" r="1.5" fill="#ffffff"/>
  <circle cx="39" cy="58" r="0.8" fill="#d1d5db"/>
  <circle cx="66" cy="40" r="1.5" fill="#ffffff"/>
  <circle cx="67" cy="40" r="0.8" fill="#d1d5db"/>
  <!-- Very fine texture on mound -->
  <ellipse cx="60" cy="56" rx="20" ry="8" fill="none" stroke="#f3f4f6" stroke-width="0.5" opacity="0.8"/>
  <ellipse cx="60" cy="56" rx="15" ry="6" fill="none" stroke="#f3f4f6" stroke-width="0.5" opacity="0.6"/>
</svg>
