  <ellipse cx="60" cy="20" rx="4" ry="3" fill="#ef4444" opacity="0.9"/>
  <ellipse cx="72" cy="26" rx="4" ry="3" fill="#f97316" opacity="0.9"/>
  <!-- Pollen / dust effect -->
  <circle cx="55" cy="35" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="65" cy="32" r="1.2" fill="#fbbf24" opacity="0.5"/>
  <circle cx="68" cy="45" r="0.8" fill="#fbbf24" opacity="0.5"/>
