  <!-- Thread 1 -->
  <path d="M50 82 Q48 60 46 40 Q44 30 50 25 Q52 22 54 25 Q56 30 52 40 Q50 60 52 82 Z"
        fill="#ea580c" opacity="0.85"/>
  <path d="M50 25 Q52 18 55 22 Q54 28 52 32" fill="#f97316" opacity="0.9"/>
