  <path d="M60 82 Q62 60 64 40 Q66 28 62 22 Q60 19 58 22 Q56 28 58 40 Q60 60 60 82 Z"
        fill="#dc2626" opacity="0.8"/>
  <path d="M62 22 Q60 16 57 20 Q58 26 60 30" fill="#ef4444" opacity="0.9"/>
  <!-- Thread 3 -->
  <path d="M72 80 Q70 60 68 42 Q66 32 70 27 Q72 24 75 27 Q77 32 74 42 Q72 60 72 80 Z"
        fill="#ea580c" opacity="0.85"/>
  <path d="M70 27 Q73 20 76 24 Q75 30 73 34" fill="#f97316" opacity="0.9"/>
