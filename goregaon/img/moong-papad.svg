<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="#fefce8"/>
  <!-- Papad disc — slightly oval/tilted like a lying papad -->
  <ellipse cx="60" cy="62" rx="40" ry="36" fill="#e8e047" opacity="0.85" transform="rotate(-8 60 62)"/>
  <!-- Inner ring — papad is thin so shows some translucency -->
  <ellipse cx="60" cy="62" rx="36" ry="32" fill="#f0e84a" opacity="0.6" transform="rotate(-8 60 62)"/>
  <!-- Lighter center -->
  <ellipse cx="58" cy="60" rx="22" ry="19" fill="#f5f09a" opacity="0.5" transform="rotate(-8 60 62)"/>
  <!-- Bubble texture — papads have characteristic air bubbles when roasted -->
  <circle cx="48" cy="52" r="4" fill="#ffffff" opacity="0.35"/>
  <circle cx="68" cy="48" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="72" cy="64" r="5" fill="#ffffff" opacity="0.3"/>
  <circle cx="50" cy="70" r="3.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="62" cy="72" r="3" fill="#ffffff" opacity="0.25"/>
  <circle cx="42" cy="64" r="2.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="58" cy="46" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="76" cy="54" r="2.5" fill="#ffffff" opacity="0.25"/>
  <!-- Moong papad has a slightly greenish tinge in spots -->
  <ellipse cx="55" cy="65" rx="6" ry="5" fill="#a3e635" opacity="0.1"/>
  <ellipse cx="68" cy="55" rx="5" ry="4" fill="#a3e635" opacity="0.08"/>
  <!-- Edge darkening — crispy edges -->
  <ellipse cx="60" cy="62" rx="40" ry="36" fill="none" stroke="#ca8a04" stroke-width="2" opacity="0.35" transform="rotate(-8 60 62)"/>
  <!-- Shine highlight -->
  <ellipse cx="48" cy="48" rx="8" ry="5" fill="#ffffff" opacity="0.3" transform="rotate(-8 60 62)"/>
</svg>
