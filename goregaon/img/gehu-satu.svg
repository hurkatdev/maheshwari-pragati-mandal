<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background: golden wheat tone -->
  <circle cx="60" cy="60" r="60" fill="#fefce8"/>
  <!-- Powder mound -->
  <ellipse cx="60" cy="78" rx="42" ry="12" fill="#ca8a04" opacity="0.2"/>
  <ellipse cx="60" cy="69" rx="36" ry="15" fill="#a16207" opacity="0.3"/>
  <ellipse cx="60" cy="62" rx="28" ry="13" fill="#ca8a04" opacity="0.5"/>
  <ellipse cx="60" cy="56" rx="20" ry="9" fill="#d97706" opacity="0.55"/>
  <ellipse cx="53" cy="52" rx="8" ry="3.5" fill="#fde68a" opacity="0.5"/>
  <!-- Wheat stalks -->
  <line x1="76" y1="72" x2="76" y2="28" stroke="#ca8a04" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wheat grains on left stalk -->
  <ellipse cx="72" cy="34" rx="5" ry="8" fill="#d97706" transform="rotate(-20 72 34)"/>
  <ellipse cx="80" cy="32" rx="5" ry="8" fill="#b45309" transform="rotate(20 80 32)"/>
  <ellipse cx="74" cy="43" rx="5" ry="8" fill="#ca8a04" transform="rotate(-15 74 43)"/>
  <ellipse cx="79" cy="42" rx="5" ry="8" fill="#d97706" transform="rotate(15 79 42)"/>
  <!-- Grain details -->
  <line x1="72" y1="30" x2="72" y2="38" stroke="#92400e" stroke-width="0.8" opacity="0.6"/>
  <line x1="80" y1="28" x2="80" y2="36" stroke="#92400e" stroke-width="0.8" opacity="0.6"/>
  <!-- Small wheat grains in powder -->
  <ellipse cx="44" cy="55" rx="4" ry="6" fill="#ca8a04" transform="rotate(10 44 55)"/>
  <ellipse cx="50" cy="65" rx="3" ry="5" fill="#b45309" transform="rotate(-8 50 65)"/>
</svg>
